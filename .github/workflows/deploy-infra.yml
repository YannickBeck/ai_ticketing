name: Deploy Azure Infrastructure

on:
  push:
    paths:
      - 'infra/**'
    branches:
      - main
  workflow_dispatch:     # Manueller Trigger möglich

env:
  AZURE_RG: rg-ai-ticketing-prod
  AZURE_LOCATION: westeurope

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep (What-If)
        run: |
          az deployment sub what-if \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters @infra/params.prod.json \
            --parameters pgAdminPassword="${{ secrets.PG_ADMIN_PASSWORD }}"

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        run: |
          az deployment sub create \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters @infra/params.prod.json \
            --parameters pgAdminPassword="${{ secrets.PG_ADMIN_PASSWORD }}" \
            --name "deploy-$(date +%Y%m%d-%H%M%S)"

      - name: Output Deployed URLs
        run: |
          echo "=== Deployment Outputs ==="
          az deployment sub show \
            --name "$(az deployment sub list --query '[0].name' -o tsv)" \
            --query 'properties.outputs' \
            -o table
